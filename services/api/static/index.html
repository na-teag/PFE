<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Malware Analysis Platform</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/script.js" defer></script>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-title">Malware Analysis Platform</div>
    <div class="login-sub">Restricted access — Authentication required</div>
    <label class="login-label">Enter your API key</label>
    <input class="login-input" type="password" id="loginInput" placeholder="••••••••" />
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">Login</button>
  </div>
</div>

<header>
  <div class="header-left">
    <button class="home-btn" id="homeBtn" title="Dashboard">🏠</button>
    <div class="title">Malware Analysis Platform</div>
  </div>
  <div class="header-right">
    <div class="health-label">
      <span class="health-dot" id="healthDot"></span>
      <span id="healthLabel">Checking...</span>
    </div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">Submit file</div>
      <div class="file-drop" id="dropZone">
        <input type="file" id="fileInput"/>
        <div class="drop-icon">📁</div>
        <div class="drop-text">Click or drag a file here</div>
        <div class="drop-name" id="fileName"></div>
      </div>
      <div class="form-row">
        <select id="osSelect">
          <option value="windows">Windows 10</option>
          <option value="linux">Linux</option>
        </select>
        <button class="btn btn-primary" id="submitBtn" disabled>Submit</button>
      </div>
      <div class="submit-result" id="submitResult"></div>
    </div>

    <div class="jobs-header">
      <span class="jobs-header-label">Jobs</span>
      <span id="jobCount" class="jobs-header-count"></span>
    </div>
    <div class="jobs-controls">
      <input class="search-input" id="searchInput" type="text" placeholder="Search by filename..." />
      <select class="sort-select" id="sortSelect">
        <option value="date-desc">Date ↓</option>
        <option value="date-asc">Date ↑</option>
        <option value="name-asc">Name A-Z</option>
        <option value="name-desc">Name Z-A</option>
        <option value="status">Status</option>
      </select>
    </div>
    <div class="jobs-list" id="jobsList"><div class="empty-jobs">No jobs yet</div></div>
    <div class="pagination" id="paginationBar">
      <span id="pageInfo"></span>
      <div class="pagination-btns" id="pageBtns"></div>
    </div>
  </div>

  <div class="main" id="mainContent"></div>
</div>

</body>
</html>
