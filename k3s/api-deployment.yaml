apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: malware-analysis
spec:
  selector:
    app: api
  type: LoadBalancer
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: malware-analysis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: jteam0/malware-api:latest
          imagePullPolicy: Always
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: VIRUSTOTAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vt-credentials
                  key: api-key
            - name: RESULTS_PATH
              value: "/data/results"
          volumeMounts:
            - name: results
              mountPath: /data/results
          ports:
            - containerPort: 8000
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: results-pvc
